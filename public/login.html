<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediClock Pro - Acceso Médico</title>
    
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBa0UtmZrVekIEkjGtEee2aBIVqN4_JC6o",
            authDomain: "mediclock-recordatorios.firebaseapp.com",
            projectId: "mediclock-recordatorios",
            storageBucket: "mediclock-recordatorios.firebasestorage.app",
            messagingSenderId: "961339509446",
            appId: "1:961339509446:web:bffd114046f9aa142be5c7",
            measurementId: "G-790MWQPX85"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <style>
        :root {
            --bg-dark: #0B0F19;
            --bg-card: #151C2C;
            --c-primary: #38BDF8;
            --c-primary-hover: #0EA5E9;
            --c-text: #F3F4F6;
            --c-text-sub: #9CA3AF;
            --c-border: rgba(56, 189, 248, 0.15);
            --c-danger: #EF4444;
            --radius-lg: 16px;
            --radius-md: 10px;
            --shadow-premium: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--c-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Orbs (Visuals) */
        .ambient-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .ambient-orb {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.18;
            mix-blend-mode: screen;
            animation: float 20s infinite alternate;
        }

        .ambient-orb.blue {
            background: radial-gradient(circle, var(--c-primary) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            right: -5%;
        }

        .ambient-orb.green {
            background: radial-gradient(circle, #10B981 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            left: -5%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-premium);
            z-index: 10;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 40px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--c-border);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--c-text);
            text-align: center;
        }

        .subtitle {
            font-size: 13px;
            color: var(--c-text-sub);
            text-align: center;
            margin-top: 4px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--c-text-sub);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            color: var(--c-text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--c-primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--c-primary), var(--c-primary-hover));
            color: #000;
            border: none;
            border-radius: var(--radius-md);
            padding: 15px;
            font-family: inherit;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(56, 189, 248, 0.4);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .error-message {
            width: 100%;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--c-danger);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            font-size: 12.5px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 11px;
            color: var(--c-text-sub);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="ambient-background">
        <div class="ambient-orb blue"></div>
        <div class="ambient-orb green"></div>
    </div>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo-icon">⏰</div>
            <h2>MediClock Pro</h2>
            <div class="subtitle">Plataforma Médica de Prescripción</div>
        </div>

        <div id="error-box" class="error-message"></div>

        <form id="login-form" onsubmit="handleLogin(event)" style="width: 100%;">
            <div class="form-group">
                <label class="form-label" for="email">Correo Electrónico</label>
                <input class="form-input" type="email" id="email" required placeholder="medico@clinica.cl">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input class="form-input" type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" id="btn-submit" class="btn-submit">Ingresar al Portal</button>
        </form>

        <div class="footer-note">
            Protegido por Google Cloud & Firebase Identity
        </div>
    </div>

    <script>
        // Si el usuario ya está autenticado, enviarlo directo a pro.html
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'pro.html';
            }
        });

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');
            const submitBtn = document.getElementById('btn-submit');

            errorBox.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Autenticando...';

            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                // La redirección ocurrirá automáticamente por el observador de arriba
            } catch (err) {
                console.error("Login Error:", err);
                errorBox.style.display = 'block';
                
                // Mapeo de errores de Firebase de forma amigable
                if (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
                    errorBox.textContent = "Credenciales incorrectas. Verifique correo y contraseña.";
                } else if (err.code === 'auth/invalid-email') {
                    errorBox.textContent = "Formato de correo no válido.";
                } else {
                    errorBox.textContent = "Error al iniciar sesión: " + err.message;
                }
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ingresar al Portal';
            }
        }
    </script>
</body>
</html>
